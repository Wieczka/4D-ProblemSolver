services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: inventapassword
      POSTGRES_DB: buildwithai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buildwithai"]
      interval: 3s
      timeout: 3s
      retries: 10

  mcp-server:
    build:
      context: ./triz-mcp-server
      dockerfile: Dockerfile
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - |
          import urllib.request, urllib.error, sys
          try:
              r = urllib.request.urlopen('http://localhost:8000/health', timeout=4)
              sys.exit(0 if r.status == 200 else 1)
          except urllib.error.HTTPError as e:
              sys.exit(0 if e.code == 503 else 1)
          except Exception:
              sys.exit(1)
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  gma-mcp-server:
    build:
      context: ./gma-mcp-server
      dockerfile: Dockerfile
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
    ports:
      - "8001:8001"

  adk-agent:
    build:
      context: ./adk-agents
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_URL: http://mcp-server:8000/mcp
      GMA_MCP_SERVER_URL: http://gma-mcp-server:8001/mcp
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-0}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mcp-server:
        condition: service_healthy
      gma-mcp-server:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:inventapassword@database:5432/buildwithai?schema=public
      ADK_AGENT_URL: http://adk-agent:8081
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      adk-agent:
        condition: service_started

  frontend:
    build:
      context: ../angular
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
