services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: inventapassword
      POSTGRES_DB: buildwithai
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d buildwithai"]
      interval: 3s
      timeout: 3s
      retries: 10

  mcp-server:
    build:
      context: ./triz-mcp-server
      dockerfile: Dockerfile
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    ports:
      - "8000:8000"

  gma-mcp-server:
    build:
      context: ./gma-mcp-server
      dockerfile: Dockerfile
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
    ports:
      - "8001:8001"

  adk-agent:
    build:
      context: ./adk-agents
      dockerfile: Dockerfile
    environment:
      MCP_SERVER_URL: http://mcp-server:8000/mcp
      GMA_MCP_SERVER_URL: http://gma-mcp-server:8001/mcp
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-0}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - mcp-server
      - gma-mcp-server

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:inventapassword@database:5432/buildwithai?schema=public
      ADK_AGENT_URL: http://adk-agent:8081
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      adk-agent:
        condition: service_started

  frontend:
    build:
      context: ../angular
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
